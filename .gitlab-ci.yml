# =============================================================================
# Lowcost Traveling – GitLab CI/CD → Vercel
# =============================================================================
# Required CI/CD variables (Settings > CI/CD > Variables):
#   VERCEL_TOKEN        – Vercel personal access token
#   VERCEL_ORG_ID       – Vercel org/team ID
#   VERCEL_PROJECT_ID   – Vercel project ID
# =============================================================================

stages:
  - validate
  - deploy

default:
  image: node:20-alpine
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - node_modules/

# ---------------------------------------------------------------------------
# Validate stage – lint, type-check, tests run in parallel
# ---------------------------------------------------------------------------

lint:
  stage: validate
  script:
    - npm ci --prefer-offline
    - npm run lint
    - npm run check
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

test:
  stage: validate
  script:
    - npm ci --prefer-offline
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "master"

# ---------------------------------------------------------------------------
# Deploy – preview for MRs, production for master
# ---------------------------------------------------------------------------

deploy:preview:
  stage: deploy
  script:
    - npm i -g vercel
    - vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
    - vercel build --token="$VERCEL_TOKEN"
    - DEPLOY_URL=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
    - echo "Preview deployed to $DEPLOY_URL"
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    url: $DEPLOY_URL
    on_stop: stop:preview
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stop:preview:
  stage: deploy
  script:
    - echo "Preview environment stopped"
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
    action: stop
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true

deploy:production:
  stage: deploy
  script:
    - npm i -g vercel
    - vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
    - vercel build --prod --token="$VERCEL_TOKEN"
    - vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
  environment:
    name: production
    url: https://lowcost-traveling.com
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
